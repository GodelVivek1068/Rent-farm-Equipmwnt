<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - KrishiYantra</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body { min-height: 100vh; background: linear-gradient(135deg, var(--green-dark) 0%, #2d6a4f 100%); display: flex; flex-direction: column; }
    .auth-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
    .auth-card {
      background: var(--white); border-radius: 20px; padding: 40px 36px;
      width: 100%; max-width: 460px; box-shadow: var(--shadow-lg);
    }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo i { font-size: 2rem; color: var(--amber); }
    .auth-logo h2 { font-family: 'Playfair Display', serif; color: var(--green-dark); margin-top: 8px; font-size: 1.5rem; }
    .auth-switch { text-align: center; margin-top: 20px; font-size: 0.88rem; color: var(--gray-600); }
    .auth-switch a { color: var(--green-mid); font-weight: 600; }
    .btn-submit { width: 100%; padding: 13px; font-size: 1rem; justify-content: center; border-radius: var(--radius-sm); }
    .role-toggle { display: flex; gap: 10px; margin-bottom: 18px; }
    .role-btn {
      flex: 1; padding: 10px; border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-sm); background: var(--white); cursor: pointer;
      font-family: inherit; font-size: 0.88rem; font-weight: 600; color: var(--gray-600);
      transition: var(--transition); text-align: center;
    }
    .role-btn.active { border-color: var(--green-mid); background: var(--green-pale); color: var(--green-dark); }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand"><i class="fa-solid fa-tractor"></i><span>KrishiYantra</span></div>
    <ul class="nav-links"><li><a href="../index.html">Home</a></li><li><a href="equipment.html">Equipment</a></li></ul>
    <div class="nav-auth">
      <a href="login.html" class="btn-outline">Login</a>
    </div>
    <button class="hamburger" id="hamburger"><i class="fa-solid fa-bars"></i></button>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <i class="fa-solid fa-tractor"></i>
        <h2>Create Account</h2>
        <p>Join thousands of farmers on KrishiYantra</p>
      </div>
      <div id="alertBox"></div>

      <label style="font-size:0.85rem;font-weight:600;color:var(--gray-600);display:block;margin-bottom:8px;">I want to:</label>
      <div class="role-toggle">
        <button class="role-btn active" id="roleRenter" onclick="setRole('renter')">🌾 Rent Equipment</button>
        <button class="role-btn" id="roleOwner" onclick="setRole('owner')">🚜 List My Equipment</button>
      </div>

      <div class="two-col">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="firstName" placeholder="Rajesh"/>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="lastName" placeholder="Patil"/>
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="your@email.com"/>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="9876543210"/>
      </div>
      <div class="form-group">
        <label>Location (Village / City)</label>
        <input type="text" id="location" placeholder="e.g. Pune, Maharashtra"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 6 characters"/>
      </div>
      <button class="btn-green btn-submit" onclick="doRegister()">
        <i class="fa-solid fa-user-plus"></i> Create Account
      </button>
      <div class="auth-switch">
        Already have an account? <a href="login.html">Login here</a>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script>
    if (isLoggedIn()) window.location.href = '../index.html';
    let selectedRole = 'renter';

    function setRole(role) {
      selectedRole = role;
      document.getElementById('roleRenter').classList.toggle('active', role === 'renter');
      document.getElementById('roleOwner').classList.toggle('active', role === 'owner');
    }

    async function doRegister() {
      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const location = document.getElementById('location').value.trim();
      const password = document.getElementById('password').value;

      if (!firstName || !lastName || !email || !phone || !location || !password) {
        showAlert('alertBox', 'Please fill all fields', 'error'); return;
      }
      if (password.length < 6) {
        showAlert('alertBox', 'Password must be at least 6 characters', 'error'); return;
      }

      try {
        const res = await apiCall('POST', '/auth/register', {
          name: `${firstName} ${lastName}`, email, phone, location, password, role: selectedRole
        });
        if (res.token) {
          localStorage.setItem('token', res.token);
          localStorage.setItem('user', JSON.stringify(res.user));
          showAlert('alertBox', '✅ Account created! Redirecting...', 'success');
          setTimeout(() => window.location.href = '../index.html', 1500);
        } else {
          showAlert('alertBox', res.error || 'Registration failed', 'error');
        }
      } catch(e) {
        const message = e && e.message ? e.message : 'Cannot connect to server. Please start the backend.';
        showAlert('alertBox', message, 'error');
      }
    }
  </script>
</body>
</html>
