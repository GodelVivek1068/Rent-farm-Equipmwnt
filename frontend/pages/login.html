<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - KrishiYantra</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body { min-height: 100vh; background: linear-gradient(135deg, var(--green-dark) 0%, #2d6a4f 100%); display: flex; flex-direction: column; }
    .auth-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
    .auth-card {
      background: var(--white); border-radius: 20px; padding: 40px 36px;
      width: 100%; max-width: 420px; box-shadow: var(--shadow-lg);
    }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo i { font-size: 2rem; color: var(--amber); }
    .auth-logo h2 { font-family: 'Playfair Display', serif; color: var(--green-dark); margin-top: 8px; font-size: 1.5rem; }
    .auth-logo p { color: var(--gray-600); font-size: 0.88rem; margin-top: 4px; }
    .auth-switch { text-align: center; margin-top: 20px; font-size: 0.88rem; color: var(--gray-600); }
    .auth-switch a { color: var(--green-mid); font-weight: 600; }
    .btn-submit { width: 100%; padding: 13px; font-size: 1rem; justify-content: center; border-radius: var(--radius-sm); }
    .divider { text-align: center; margin: 16px 0; color: var(--gray-400); font-size: 0.82rem; position: relative; }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: var(--gray-200); }
    .divider::before { left: 0; } .divider::after { right: 0; }
    .role-switch { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .role-btn {
      border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); padding: 10px;
      background: var(--white); font-family: inherit; font-size: 0.88rem; font-weight: 600;
      color: var(--gray-600); cursor: pointer;
    }
    .role-btn.active { border-color: var(--green-mid); color: var(--green-dark); background: var(--green-pale); }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand"><i class="fa-solid fa-tractor"></i><span>KrishiYantra</span></div>
    <ul class="nav-links"><li><a href="../index.html">Home</a></li><li><a href="equipment.html">Equipment</a></li></ul>
    <div class="nav-auth">
      <a href="register.html" class="btn-primary">Register</a>
    </div>
    <button class="hamburger" id="hamburger"><i class="fa-solid fa-bars"></i></button>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <i class="fa-solid fa-tractor"></i>
        <h2>Welcome Back</h2>
        <p id="loginSubtitle">Login to your KrishiYantra account</p>
      </div>
      <div id="alertBox"></div>
      <div class="role-switch">
        <button type="button" id="renterLoginBtn" class="role-btn active" onclick="setLoginMode('renter')">Farmer / Renter Login</button>
        <button type="button" id="ownerLoginBtn" class="role-btn" onclick="setLoginMode('owner')">Owner Login</button>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="your@email.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Your password"/>
      </div>
      <button class="btn-green btn-submit" onclick="doLogin()">
        <i class="fa-solid fa-right-to-bracket"></i> Login
      </button>
      <div class="auth-switch">
        Don't have an account? <a href="register.html">Register here</a>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script>
    if (isLoggedIn()) window.location.href = '../index.html';
    let loginMode = 'renter';

    function setLoginMode(mode) {
      loginMode = mode;
      document.getElementById('renterLoginBtn').classList.toggle('active', mode === 'renter');
      document.getElementById('ownerLoginBtn').classList.toggle('active', mode === 'owner');
      document.getElementById('loginSubtitle').textContent = mode === 'owner'
        ? 'Owner login to manage listings and bookings'
        : 'Login to your KrishiYantra account';
    }

    async function doLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { showAlert('alertBox','Please fill all fields','error'); return; }
      try {
        const endpoint = loginMode === 'owner' ? '/auth/login-owner' : '/auth/login';
        const res = await apiCall('POST', endpoint, { email, password });
        if (res.token) {
          localStorage.setItem('token', res.token);
          localStorage.setItem('user', JSON.stringify(res.user));
          const redirect = new URLSearchParams(window.location.search).get('redirect');
          if (redirect) {
            window.location.href = redirect;
            return;
          }
          if ((res.user && res.user.role) === 'owner') {
            window.location.href = 'owner-dashboard.html';
            return;
          }
          window.location.href = '../index.html';
        } else {
          showAlert('alertBox', res.error || 'Invalid credentials', 'error');
        }
      } catch(e) {
        const message = e && e.message ? e.message : 'Cannot connect to server. Please start the backend.';
        showAlert('alertBox', message, 'error');
      }
    }

    document.getElementById('password').addEventListener('keypress', e => { if(e.key==='Enter') doLogin(); });
  </script>
</body>
</html>
